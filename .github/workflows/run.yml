# This workflow will install Python dependencies, run tests and lint with a single version of Python
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: arXiv-daily-ai-enhanced

on:
  schedule:
    - cron: "30 1 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          uv sync

      - name: Crawl arXiv papers
        id: crawl_step
        run: |
          source .venv/bin/activate
          today=$(TZ="Asia/Shanghai" date "+%Y-%m-%d")
          echo "开始爬取 $today 的arXiv论文... / Starting to crawl $today arXiv papers..."

          if [ -f "data/${today}.jsonl" ]; then
              echo "🗑️ 发现今日文件已存在，正在删除重新生成..."
              rm "data/${today}.jsonl"
          else
              echo "📝 今日文件不存在，准备新建..."
          fi

          cd daily_arxiv
          export OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
          export OPENAI_BASE_URL=${{ secrets.OPENAI_BASE_URL }}
          export TOKEN_GITHUB=${{ secrets.TOKEN_GITHUB }}
          export LANGUAGE="${{ vars.LANGUAGE }}"
          export CATEGORIES="${{ vars.CATEGORIES }}"
          export MODEL_NAME="${{ vars.MODEL_NAME }}"

          scrapy crawl arxiv -o ../data/${today}.jsonl

          if [ ! -f "../data/${today}.jsonl" ]; then
              echo "爬取失败，未生成数据文件"
              exit 1
          fi

          echo "crawl_date=$today" >> $GITHUB_OUTPUT
          echo "爬取完成 / Crawling completed"

      - name: Check for duplicates
        id: dedup_check
        run: |
          echo "跳过去重检查，假设有新内容 / Skipping dedup check, assuming new content"
          echo "has_new_content=true" >> $GITHUB_OUTPUT

      - name: AI Enhancement Processing
        if: steps.dedup_check.outputs.has_new_content == 'true'
        run: |
          source .venv/bin/activate
          today=${{ steps.crawl_step.outputs.crawl_date }}
          echo "开始AI增强处理... / Starting AI enhancement processing..."

          cd ai
          export OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
          export OPENAI_BASE_URL=${{ secrets.OPENAI_BASE_URL }}
          export LANGUAGE="${{ vars.LANGUAGE }}"
          export MODEL_NAME="${{ vars.MODEL_NAME }}"

          python enhance.py --data ../data/${today}.jsonl

          if [ $? -ne 0 ]; then
              echo "AI处理失败 / AI processing failed"
              exit 1
          fi
          echo "AI增强处理完成 / AI enhancement processing completed"

      - name: Convert to Markdown
        if: steps.dedup_check.outputs.has_new_content == 'true'
        run: |
          source .venv/bin/activate
          today=${{ steps.crawl_step.outputs.crawl_date }}
          echo "转换为Markdown格式... / Converting to Markdown format..."

          export LANGUAGE="${{ vars.LANGUAGE }}"

          cd to_md

          AI_FILE="../data/${today}_AI_enhanced_${LANGUAGE}.jsonl"

          if [ -f "$AI_FILE" ]; then
              echo "使用AI增强文件进行转换..."
              python convert.py --data "$AI_FILE"
          else
              echo "错误：未找到AI增强文件 / Error: AI enhanced file not found"
              echo "AI文件: $AI_FILE"
              exit 1
          fi

          if [ $? -ne 0 ]; then
              echo "Markdown转换失败 / Markdown conversion failed"
              exit 1
          fi
          echo "Markdown转换完成 / Markdown conversion completed"

      - name: Update file list
        if: steps.dedup_check.outputs.has_new_content == 'true'
        run: |
          echo "更新文件列表... / Updating file list..."
          ls data/*.jsonl | sed 's|data/||' > assets/file-list.txt
          echo "文件列表更新完成 / File list updated"

      - name: Generate password hash and inject into config
        if: steps.dedup_check.outputs.has_new_content == 'true'
        run: |
          echo "🔐 Generating password hash for authentication..."
          PASSWORD="${{ secrets.ACCESS_PASSWORD }}"
          if [ -z "$PASSWORD" ]; then
            echo "⚠️  WARNING: ACCESS_PASSWORD not set in Secrets"
            echo "⚠️  Password protection will be DISABLED"
            PASSWORD_HASH="DISABLED_NO_PASSWORD_SET_IN_SECRETS"
          else
            PASSWORD_HASH=$(echo -n "$PASSWORD" | openssl dgst -sha256 -hex | awk '{print $2}')
            echo "✅ Password hash generated successfully"
          fi
          if [ -f "js/auth-config.js" ]; then
            sed -i "s/PLACEHOLDER_PASSWORD_HASH/$PASSWORD_HASH/" js/auth-config.js
            echo "✅ Password hash injected into js/auth-config.js"
          else
            echo "❌ ERROR: js/auth-config.js not found!"
            exit 1
          fi
          echo "🔐 Authentication setup complete"

      - name: Summary
        run: |
          if [ "${{ steps.dedup_check.outputs.has_new_content }}" = "true" ]; then
            echo "✅ 工作流完成：去重发现新内容并成功处理"
          else
            echo "ℹ️ 工作流完成：无新内容"
          fi

      - name: Inject repository info into data-config.js
        if: steps.dedup_check.outputs.has_new_content == 'true'
        run: |
          echo "注入仓库信息到 data-config.js..."
          REPO_OWNER="${{ github.repository_owner }}"
          REPO_NAME="${{ github.event.repository.name }}"
          if [ -f "js/data-config.js" ]; then
            sed -i "s/PLACEHOLDER_REPO_OWNER/$REPO_OWNER/g" js/data-config.js
            sed -i "s/PLACEHOLDER_REPO_NAME/$REPO_NAME/g" js/data-config.js
            echo "✅ 仓库信息已注入"
          else
            echo "❌ ERROR: js/data-config.js not found!"
            exit 1
          fi

      - name: Commit code changes to main branch
        if: steps.dedup_check.outputs.has_new_content == 'true'
        run: |
          git config --global user.email "${{ vars.EMAIL }}"
          git config --global user.name "${{ vars.NAME }}"

          git add js/data-config.js
          git add .github/
          git add -A
          git reset -- data/* assets/file-list.txt 2>/dev/null || true

          if git diff --staged --quiet; then
            echo "没有代码变更需要提交"
          else
            git commit -m "chore: update data-config.js with repository info"
            echo "代码变更已提交"
          fi

      - name: Push code changes to main branch
        if: steps.dedup_check.outputs.has_new_content == 'true'
        run: |
          git config pull.rebase true
          git config rebase.autoStash true

          # 设置远程 URL 并打印调试信息
          REPO_URL="https://${{ secrets.TOKEN_GITHUB }}@github.com/xiaof456-hash/daily-arXiv-ai-enhanced.git"
          echo "Token 长度: ${#TOKEN_GITHUB}"          # 调试
          echo "REPO_URL 长度: ${#REPO_URL}"          # 调试
          git remote set-url origin "$REPO_URL"

          for i in {1..3}; do
            echo "推送代码变更尝试 $i"
            if git push origin main; then
              echo "代码变更推送成功"
              break
            else
              echo "推送失败，拉取最新变更..."
              git pull origin main --no-edit || true
              if [ $i -eq 3 ]; then
                echo "3次尝试后推送失败"
                exit 1
              fi
            fi
          done
       
      

      - name: Prepare data files for data branch
        if: steps.dedup_check.outputs.has_new_content == 'true'
        run: |
          echo "准备数据文件..."
          today=${{ steps.crawl_step.outputs.crawl_date }}
          mkdir -p /tmp/data_files/data
          mkdir -p /tmp/data_files/assets
          cp -r data/* /tmp/data_files/data/ 2>/dev/null || true
          cp assets/file-list.txt /tmp/data_files/assets/ 2>/dev/null || true
          echo "数据文件已保存到临时目录"

      - name: Setup and commit to data branch
        if: steps.dedup_check.outputs.has_new_content == 'true'
        run: |
          git config --global user.email "${{ vars.EMAIL }}"
          git config --global user.name "${{ vars.NAME }}"

          echo "设置 data 分支..."
          today=${{ steps.crawl_step.outputs.crawl_date }}

          rm -rf data/*.jsonl 2>/dev/null || true
          rm -f data/*.md 2>/dev/null || true
          rm -f assets/file-list.txt 2>/dev/null || true

          if git ls-remote --heads origin data | grep -q data; then
            echo "data 分支已存在，切换到 data 分支"
            git fetch origin data:data
            git checkout data
            git pull origin data || true
          else
            echo "data 分支不存在，创建新分支"
            git checkout --orphan data
            git rm -rf --cached . 2>/dev/null || true
            mkdir -p data assets
            echo "# Data Branch" > README.md
            git add README.md
            git commit -m "chore: initialize data branch"
            git push origin data
          fi

          mkdir -p data assets
          cp -r /tmp/data_files/data/* data/ 2>/dev/null || true
          cp /tmp/data_files/assets/file-list.txt assets/ 2>/dev/null || true

          git add data/* 2>/dev/null || true
          git add assets/file-list.txt 2>/dev/null || true

          if git diff --staged --quiet; then
            echo "没有数据变更需要提交"
          else
            git commit -m "update: $today arXiv papers"
            echo "数据变更已提交"
          fi

      - name: Push data changes to data branch
        if: steps.dedup_check.outputs.has_new_content == 'true'
        run: |
          git config pull.rebase true
          git config rebase.autoStash true

          REPO_URL="https://${{ secrets.TOKEN_GITHUB }}@github.com/xiaof456-hash/daily-arXiv-ai-enhanced.git"
          echo "Token 长度: ${#TOKEN_GITHUB}"
          echo "REPO_URL 长度: ${#REPO_URL}"
          git remote set-url origin "$REPO_URL"

          for i in {1..3}; do
            echo "推送数据变更尝试 $i"
            if git push origin data; then
              echo "数据变更推送成功"
              break
            else
              echo "推送失败，拉取最新变更..."
              git pull origin data --no-edit || true
              if [ $i -eq 3 ]; then
                echo "3次尝试后推送失败"
                exit 1
              fi
            fi
          done
      
